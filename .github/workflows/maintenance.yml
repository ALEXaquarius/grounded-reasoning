name: maintenance

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete stale branch
        run: |
          git push origin --delete claude/rag-laclac-open-source-docs-0fsc2e || echo "branch already gone"

      - name: Fix v0.1.0 release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > /tmp/notes.md <<'NOTES'
          First public release of **grounded-reasoning**: a relation-algebra verifier that
          lets an LLM or agent check a multi-hop relational claim *before* asserting it —
          at **zero model tokens**, with a **precision guarantee** (a claim is accepted iff
          a grounded proof path exists).

          ## Highlights

          - **HallucinationGuard** — on real DeepSeek, multi-hop precision goes 33% → 100%
            (catches 94/94 fabrications, drops zero correct answers) at **+0 tokens**;
            LLM self-verification costs +110% tokens for 34% precision.
          - **F = G = H unification** — fuzzy diffusion inference, relation operator
            algebra, and the Katz spectral resolvent proven to be the same operator
            (zero numerical error).
          - **SGDC** — a self-grounded mode needing **no external knowledge base**:
            precision 78% → 100% from the LLM's own internal consistency (Theorem I gives
            a two-sided precision/recall bound).
          - **Conformal mode** — distribution-free coverage ≥ 1−α even on a **noisy**
            graph, validated end-to-end on a graph DeepSeek extracted from raw text
            (coverage held at 93% despite 31% of edges lost in extraction).
          - **CLUTRR benchmark** — the grounded solver holds ~100% flat across 2–10
            composition hops (full clean-chain test set n=635: 99.5% coverage, 99.2%
            accuracy) while DeepSeek falls 83% → 8%.
          - **Three integration paths** — Python library, stateless function-calling tool
            (Anthropic/OpenAI schemas), and an MCP server. Language-agnostic entities;
            provider-agnostic LLM client (DeepSeek / OpenAI / Groq / OpenRouter /
            Together / Mistral / Ollama).

          ## What this is not

          Not a new mathematical primitive — the Katz index, Neumann series, conformal
          prediction, and Horn logic are classical. The contribution is the unification,
          a *measured* guarantee with its cost on a real LLM, and an honest description
          of the boundary: the guard verifies against a supplied relation graph; it does
          not extract relations from free text itself.

          ## Install & verify everything yourself

          ```bash
          pip install grounded-reasoning          # on PyPI

          # or from source, with the full offline test suite:
          git clone https://github.com/ALEXaquarius/grounded-reasoning
          cd grounded-reasoning && pip install -e ".[dev]"
          pytest tests/        # 116 tests, fully offline — every theorem + every locked invariant
          ```

          Or run the [quickstart notebook](https://colab.research.google.com/github/ALEXaquarius/grounded-reasoning/blob/main/examples/quickstart.ipynb)
          in Colab — it executes all seven theorem verifications live.

          Seven theorems (F–L), stated, proved, and numerically verified:
          [PAPER.md](https://github.com/ALEXaquarius/grounded-reasoning/blob/main/PAPER.md).
          NOTES
          gh release edit v0.1.0 --repo "$GITHUB_REPOSITORY" --notes-file /tmp/notes.md
